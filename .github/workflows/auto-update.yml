name: 月度数据自动更新

on:
  schedule:
    # 每月18号 UTC 2:00 (北京时间 10:00)
    - cron: '0 2 18 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行数据更新脚本
        run: python3 auto_update.py --skip-push

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html city_data_compact.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update: $(date +'%Y-%m') data"
            git push
          fi
