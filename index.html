<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鸣海投资房地产数据库</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#1a1a2e;line-height:1.6;}
.hdr{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff;padding:14px 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.15);display:flex;justify-content:space-between;align-items:center;}
.hdr h1{font-size:1.25rem;}
.logo-img{height:40px;width:auto;border-radius:4px;}
.ctr{max-width:1500px;margin:0 auto;padding:14px 24px;}
.top-tabs{display:flex;margin-bottom:12px;background:#fff;border-radius:10px;padding:3px;box-shadow:0 2px 12px rgba(0,0,0,.05);}
.top-tab{flex:1;padding:10px;border:none;background:transparent;cursor:pointer;font-size:.85rem;color:#666;border-radius:8px;font-family:inherit;}
.top-tab.active{background:#2c3e50;color:#fff;}
.flt{background:#fff;border-radius:10px;padding:10px 16px;box-shadow:0 2px 12px rgba(0,0,0,.05);margin-bottom:12px;display:flex;align-items:center;flex-wrap:wrap;gap:8px;font-size:.8rem;}
.flt select{padding:5px 8px;border:1px solid #e8e8e8;border-radius:6px;font-size:.8rem;}
.btn{padding:5px 14px;border:none;border-radius:6px;cursor:pointer;font-size:.8rem;font-family:inherit;}
.btn1{background:#2c3e50;color:#fff;}.btn2{background:#fff;color:#2c3e50;border:1px solid #2c3e50;}.btn3{background:#27ae60;color:#fff;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:12px;}
.sc{background:#fff;border-radius:10px;padding:12px 16px;box-shadow:0 2px 12px rgba(0,0,0,.05);border-left:4px solid #e74c3c;}
.sc .lbl{font-size:.74rem;color:#666;}.sc .val{font-size:1.15rem;font-weight:700;}
.tbar{display:flex;gap:3px;margin-bottom:12px;background:#fff;border-radius:10px;padding:3px;box-shadow:0 2px 12px rgba(0,0,0,.05);flex-wrap:wrap;}
.tbtn{flex:1;min-width:70px;padding:7px 8px;border:none;background:transparent;cursor:pointer;font-size:.76rem;color:#666;border-radius:7px;font-family:inherit;white-space:nowrap;}
.tbtn.active{background:#2c3e50;color:#fff;}
.cc{background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.05);margin-bottom:12px;}
.cc .chd{padding:10px 18px;border-bottom:1px solid #e8e8e8;display:flex;justify-content:space-between;}
.cc .chd h3{font-size:.9rem;}
.cbd{width:100%;height:400px;}
.tw{background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.05);margin-bottom:18px;}
.tw .thd{padding:10px 18px;border-bottom:1px solid #e8e8e8;display:flex;justify-content:space-between;}
.tscroll{overflow:auto;max-height:500px;}
table{width:100%;border-collapse:collapse;font-size:.74rem;}
th{background:#fafafa;padding:7px;text-align:center;font-weight:600;color:#666;border-bottom:2px solid #e8e8e8;position:sticky;top:0;}
td{padding:6px;text-align:center;border-bottom:1px solid #e8e8e8;white-space:nowrap;}
tr:hover{background:#f8f9ff;}
.r{color:#e74c3c;}.g{color:#27ae60;}
.mchips{display:flex;gap:3px;flex-wrap:wrap;}
.mchip{padding:2px 7px;border:1px solid #e8e8e8;border-radius:12px;cursor:pointer;font-size:.72rem;transition:all .2s;background:#fff;user-select:none;}
.mchip.active{background:#2c3e50;color:#fff;border-color:#2c3e50;}
.ftr{text-align:center;padding:16px;color:#999;font-size:.7rem;}
.ccity{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:14px;font-size:.72rem;cursor:pointer;border:1px solid #e0e0e0;background:#fff;margin:2px;}
.ccity.active{background:#2c3e50;color:#fff;border-color:#2c3e50;}
.ccity .cx{font-size:.6rem;opacity:.6;margin-left:2px;}
.ccity.active .cx{opacity:1;}
.ccity:hover{opacity:.8;}
.dd-wrap{position:relative;display:inline-block;}
.dd-list{display:none;position:absolute;top:100%;left:0;z-index:999;background:#fff;border:1px solid #e0e0e0;border-radius:6px;max-height:400px;overflow-y:auto;min-width:160px;box-shadow:0 4px 12px rgba(0,0,0,.1);}
.dd-list.show{display:block;}
.dd-item{padding:5px 12px;cursor:pointer;font-size:.72rem;}
.dd-item:hover{background:#f0f4ff;}
.chip{display:inline-flex;align-items:center;gap:2px;padding:2px 8px;background:#e8edf5;border-radius:12px;font-size:.72rem;margin:1px 2px;white-space:nowrap;}
.chip-x{color:#999;font-weight:bold;text-decoration:none;margin-left:2px;}
.chip-x:hover{color:#e74c3c;}
#csch{border:1px solid #dcdfe6;border-radius:4px;padding:2px 8px;outline:none;}
#csch:focus{border-color:#5470c6;}
@media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr);}.tbtn{font-size:.68rem;min-width:55px;}}
</style>
</head>
<body>
<div class="hdr">
    <div style="display:flex;align-items:center;gap:12px;"><img src="logo.png" class="logo-img"><h1>鸣海投资房地产数据库</h1><div style="font-size:.7rem;opacity:.7">国家统计局 · 2011年至今</div></div>
    <div style="font-size:.7rem;opacity:.5" id="ut"></div>
</div>
<div class="ctr">
<div class="top-tabs">
    <button class="top-tab active" onclick="switchView('natl')">📊 全国信息</button>
    <button class="top-tab" onclick="switchView('reg')">🏙️ 地区信息</button>
</div>

<!-- NATIONAL -->
<div id="vn">
<div class="flt">
    📅 <select id="fsY"></select>年<select id="fsM"></select> —
    <select id="feY"></select>年<select id="feM"></select>
    <button class="btn btn1" onclick="applyNatl()">应用</button>
    📆 月份: <span id="mchips" class="mchips"></span>
    <button class="btn btn2" onclick="resetNMonth()">全部</button>
    <button class="btn btn3" onclick="exportNatl()" style="margin-left:auto">📥 Excel</button>
</div>
<div class="stats" id="ns"></div>
<div class="tbar" id="ntbs"></div>
<div class="cc"><div class="chd"><h3 id="nct"></h3><span style="font-size:.72rem;color:#999" id="ncu"></span></div><div class="cbd" id="nc"></div></div>
<div class="cc"><div class="chd"><h3>全板块同比增速</h3></div><div class="cbd" id="ny"></div></div>
<div class="tw"><div class="thd"><h3>📋 月度明细</h3><span style="font-size:.72rem;color:#999" id="nti"></span></div><div class="tscroll" id="nt"></div></div>
</div>

<!-- REGIONAL -->
<div id="vr" style="display:none">
<div class="flt" style="flex-wrap:wrap;gap:6px">
    🏙️ <span id="cityChips"></span>
    <input type="text" id="csch" placeholder="+ 添加城市..." style="width:110px;font-size:.78rem" 
        onfocus="showCityDd()" oninput="filterCityDd()" onblur="setTimeout(()=>hideCityDd(),200)">
    <div class="dd-wrap"><div class="dd-list" id="cdd"></div></div>
</div>
<div class="flt" style="flex-wrap:wrap;gap:6px">
    📅 基期(指数=100): <select id="rbY"></select>年<select id="rbM"></select>
    <button class="btn btn1" onclick="applyCity()">设定基期</button>
    范围: <select id="rsY"></select>年<select id="rsM"></select> —
    <select id="reY"></select>年<select id="reM"></select>
    <button class="btn btn2" onclick="applyCity()">应用</button>
    <button class="btn btn3" onclick="exportCity()" style="margin-left:auto">📥 Excel</button>
</div>
<div class="stats" id="rs"></div>
<div class="tbar" id="rtbs">
    <button class="tbtn active" data-rt="new">📈 新建住宅定基指数</button>
    <button class="tbtn" data-rt="sh">📉 二手住宅定基指数</button>
</div>
<div class="cc"><div class="chd"><h3 id="rct">城市房价定基指数</h3></div><div class="cbd" id="rc"></div></div>
<div class="tw" id="rtw"><div class="thd"><h3>📋 数据明细</h3><span style="font-size:.72rem;color:#999" id="rti"></span></div><div class="tscroll" id="rtt"></div></div>
</div>
</div>
<div class="ftr">数据来源: 国家统计局 · 腾讯自选股/聚源接口</div>

<script>
// ===== COMPUTED =====
D.forEach(r=>{
    r.priceAvg = r.salesAreaCum>0 ? r.salesAmtCum/r.salesAreaCum*10000 : null;
    let fds=[r.fundDepositCum,r.fundSelfCum,r.fundLoanCum,r.fundOtherCum,r.fundForeignCum];
    r.fundTotal = fds.every(v=>v!==null&&v!==undefined) ? fds.reduce((a,b)=>a+b,0) : null;
});
// Compute YoY for computed fields (fundTotal, priceAvg) by matching same month in previous year
D.forEach((r,i)=>{
    let mm = r.d.substring(5);
    let py = (parseInt(r.d.substring(0,4))-1).toString();
    let prev = D.find(x=>x.d===py+'-'+mm);
    r.fundTotalYoy = prev&&prev.fundTotal!=null&&r.fundTotal!=null ? ((r.fundTotal-prev.fundTotal)/Math.abs(prev.fundTotal)*100) : null;
    r.priceAvgYoy = prev&&prev.priceAvg!=null&&r.priceAvg!=null ? ((r.priceAvg-prev.priceAvg)/prev.priceAvg*100) : null;
    r.fundDepYoy = prev&&r.fundDepositCum!=null&&prev.fundDepositCum!=null ? ((r.fundDepositCum-prev.fundDepositCum)/Math.abs(prev.fundDepositCum)*100) : null;
    r.fundSelfYoy = prev&&r.fundSelfCum!=null&&prev.fundSelfCum!=null ? ((r.fundSelfCum-prev.fundSelfCum)/Math.abs(prev.fundSelfCum)*100) : null;
    r.fundLoanYoy = prev&&r.fundLoanCum!=null&&prev.fundLoanCum!=null ? ((r.fundLoanCum-prev.fundLoanCum)/Math.abs(prev.fundLoanCum)*100) : null;
    r.fundOtherYoy = prev&&r.fundOtherCum!=null&&prev.fundOtherCum!=null ? ((r.fundOtherCum-prev.fundOtherCum)/Math.abs(prev.fundOtherCum)*100) : null;
    r.fundForeignYoy = prev&&r.fundForeignCum!=null&&prev.fundForeignCum!=null ? ((r.fundForeignCum-prev.fundForeignCum)/Math.abs(prev.fundForeignCum)*100) : null;
});
const NN=v=>(v===null||v===undefined)?null:v;
const priceSMA = (()=>{
    let out=[];
    for(let i=0;i<D.length;i++){
        if(D[i].priceAvg===null){out.push(null);continue;}
        let s=0,c=0;
        for(let j=Math.max(0,i-5);j<=i;j++){if(D[j].priceAvg!==null){s+=D[j].priceAvg;c++;}}
        out.push(c>=3?s/c:null);
    }
    return out;
})();

// ===== NATIONAL STATE =====
let nF=[...D], nT='invest';
let _mc=null,_yc=null;

// Tab config
const NTABS = [
    {t:'invest',l:'开发投资',title:'房地产开发投资额',u:'亿元',bf:'investTotalCum',bc:'#e74c3c',yf:'investTotalCumYoy',bn:'累计投资额'},
    {t:'sales',l:'销售面积',title:'商品房销售面积',u:'万㎡',bf:'salesAreaCum',bc:'#2ecc71',yf:'salesAreaCumYoy',bn:'累计销售面积'},
    {t:'revenue',l:'销售额',title:'商品房销售额',u:'亿元',bf:'salesAmtCum',bc:'#9b59b6',yf:'salesAmtCumYoy',bn:'累计销售额'},
    {t:'newstarts',l:'新开工',title:'新开工面积',u:'万㎡',bf:'newStartsCum',bc:'#1abc9c',yf:'newStartsCumYoy',bn:'新开工面积'},
    {t:'constr',l:'施工面积',title:'施工面积',u:'万㎡',bf:'constrCum',bc:'#3498db',yf:'constrCumYoy',bn:'施工面积'},
    {t:'comp',l:'竣工面积',title:'竣工面积',u:'万㎡',bf:'compCum',bc:'#e74c3c',yf:'compCumYoy',bn:'竣工面积'},
];

// Init filter controls
(function initCtrls(){
    let yrs=[...new Set(D.map(d=>d.d.substring(0,4)))].sort();
    ['fsY','feY','rbY','rsY','reY'].forEach(id=>{
        let el=document.getElementById(id); if(!el)return;
        yrs.forEach(y=>{el.innerHTML+=`<option>${y}</option>`;});
        if(id==='reY'||id==='feY') el.value=yrs[yrs.length-1];
    });
    ['fsM','feM','rbM','rsM','reM'].forEach(id=>{
        let el=document.getElementById(id); if(!el)return;
        for(let m=1;m<=12;m++){el.innerHTML+=`<option value="${String(m).padStart(2,'0')}">${m}月</option>`;}
        if(id==='feM'||id==='reM') el.value='12'; else el.value='01';
    });
    // Adjust region defaults based on RD data (earliest month is 201103)
    (function(){
        let rMs=new Set();
        if(typeof RD!=='undefined')Object.values(RD).forEach(o=>Object.keys(o).forEach(m=>rMs.add(m)));
        rMs=[...rMs].sort();
        if(rMs.length===0)return;
        let rfY=rMs[0].substring(0,4),rfM=rMs[0].substring(4,6);
        let rlY=rMs[rMs.length-1].substring(0,4),rlM=rMs[rMs.length-1].substring(4,6);
        ['rbY','rsY'].forEach(id=>{let e=document.getElementById(id);if(e)e.value=rfY;});
        ['rbM','rsM'].forEach(id=>{let e=document.getElementById(id);if(e)e.value=rfM;});
        let eY=document.getElementById('reY');if(eY)eY.value=rlY;
        let eM=document.getElementById('reM');if(eM)eM.value=rlM;
    })();
})();

// Build national tab buttons
(function buildTabs(){
    let tb=document.getElementById('ntbs');
    NTABS.forEach((t,i)=>{
        if(i>0&&i%3===0) tb.innerHTML+='<span style="width:1px;background:#e8e8e8;margin:3px 0"></span>';
        tb.innerHTML+=`<button class="tbtn${i===0?' active':''}" data-t="${t.t}">${t.l}</button>`;
    });
    // Special tabs
    tb.innerHTML+='<span style="width:1px;background:#e8e8e8;margin:3px 0"></span>';
    tb.innerHTML+='<button class="tbtn" data-t="price">销售均价</button>';
    tb.innerHTML+='<button class="tbtn" data-t="inventory">待售库存</button>';
    tb.innerHTML+='<span style="width:1px;background:#e8e8e8;margin:3px 0"></span>';
    tb.innerHTML+='<button class="tbtn" data-t="funding">资金来源</button>';
    tb.innerHTML+='<button class="tbtn" data-t="totalfund">到位资金</button>';
    
    tb.querySelectorAll('.tbtn').forEach(b=>{
        b.addEventListener('click',()=>{
            tb.querySelectorAll('.tbtn').forEach(x=>x.classList.remove('active'));
            b.classList.add('active');
            nT=b.dataset.t;
            renderNChart();
        });
    });

})();

// Month filter
let nMonthSet=null;
// Build month chips
(function(){
    let mc=document.getElementById('mchips');
    for(let m=1;m<=12;m++){
        let v=String(m).padStart(2,'0');
        mc.innerHTML+=`<span class="mchip" data-m="${v}" onclick="togMonth(this,'${v}')">${m}月</span>`;
    }
})();
function togMonth(el,m){
    el.classList.toggle('active');
    if(!nMonthSet)nMonthSet=new Set();
    if(el.classList.contains('active'))nMonthSet.add(m);else nMonthSet.delete(m);
    if(nMonthSet.size===0||nMonthSet.size===12)nMonthSet=null;
    applyNatl();
}
function resetNMonth(){
    nMonthSet=null;
    document.querySelectorAll('#vn .mchip').forEach(c=>c.classList.remove('active'));
    applyNatl();
}

function applyNatl(){
    let sy=document.getElementById('fsY').value, sm=document.getElementById('fsM').value;
    let ey=document.getElementById('feY').value, em=document.getElementById('feM').value;
    let ss=sy+'-'+sm, ee=ey+'-'+em;
    nF=D.filter(d=>{
        if(d.d<ss||d.d>ee)return false;
        if(nMonthSet&&!nMonthSet.has(d.d.substring(5,7)))return false;
        return true;
    });
    updateNall();
}

function getLabels(){return nF.map(d=>d.d);}
function getInt(){return Math.max(1,Math.floor(nF.length/20));}

function renderNChart(){
    if(_mc){_mc.dispose();_mc=null;}
    let el=document.getElementById('nc');
    if(!el){console.error('nc not found');return;}
    _mc=echarts.init(el);
    
    if(nT==='price'){
        document.getElementById('nct').textContent='商品房销售均价 · 6月平滑';
        document.getElementById('ncu').textContent='元/㎡';
        _mc.setOption({
            tooltip:{trigger:'axis'},legend:{data:['当月均价','6月平滑'],bottom:0},
            grid:{left:60,right:30,top:15,bottom:40},
            xAxis:{type:'category',data:getLabels(),axisLabel:{rotate:45,fontSize:9,interval:getInt()}},
            yAxis:{type:'value',name:'元/㎡',min:4000},
            series:[
                {name:'当月均价',type:'line',data:nF.map(d=>NN(d.priceAvg)),lineStyle:{color:'#e74c3c',width:2},symbol:'circle',symbolSize:4},
                {name:'6月平滑',type:'line',data:nF.map(d=>NN(priceSMA[D.indexOf(d)])),lineStyle:{color:'#2c3e50',width:3},symbol:'circle',symbolSize:3}
            ]
        });
        return;
    }
    if(nT==='inventory'){
        document.getElementById('nct').textContent='商品房待售面积';
        document.getElementById('ncu').textContent='万㎡';
        _mc.setOption({
            tooltip:{trigger:'axis'},legend:{data:['待售面积'],bottom:0},
            grid:{left:60,right:30,top:15,bottom:40},
            xAxis:{type:'category',data:getLabels(),axisLabel:{rotate:45,fontSize:9,interval:getInt()}},
            yAxis:{type:'value',name:'万㎡',min:20000},
            series:[{name:'待售面积',type:'line',data:nF.map(d=>NN(d.inventory)),lineStyle:{color:'#e74c3c',width:2},areaStyle:{color:'rgba(231,76,60,.1)'},symbol:'circle',symbolSize:5}]
        });
        return;
    }
    if(nT==='funding'){
        document.getElementById('nct').textContent='资金来源明细';
        document.getElementById('ncu').textContent='亿元';
        let cols=[['定金及预收款','#e74c3c','fundDepositCum'],['自筹资金','#3498db','fundSelfCum'],['国内贷款','#2ecc71','fundLoanCum'],['其他资金','#f39c12','fundOtherCum'],['利用外资','#9b59b6','fundForeignCum']];
        _mc.setOption({
            tooltip:{trigger:'axis'},legend:{data:cols.map(c=>c[0]),bottom:0,textStyle:{fontSize:9}},
            grid:{left:60,right:30,top:15,bottom:40},
            xAxis:{type:'category',data:getLabels(),axisLabel:{rotate:45,fontSize:9,interval:getInt()}},
            yAxis:{type:'value',name:'亿元'},
            series:cols.map(([n,c,k])=>({name:n,type:'line',data:nF.map(d=>NN(d[k])),lineStyle:{color:c,width:2},smooth:true,symbol:'circle',symbolSize:2}))
        });
        return;
    }
    if(nT==='totalfund'){
        document.getElementById('nct').textContent='实际到位资金(五项合计)';
        document.getElementById('ncu').textContent='亿元';
        _mc.setOption({
            tooltip:{trigger:'axis'},legend:{data:['实际到位资金'],bottom:0},
            grid:{left:60,right:30,top:15,bottom:40},
            xAxis:{type:'category',data:getLabels(),axisLabel:{rotate:45,fontSize:9,interval:getInt()}},
            yAxis:{type:'value',name:'亿元'},
            series:[{name:'实际到位资金',type:'line',data:nF.map(d=>NN(d.fundTotal)),lineStyle:{color:'#e74c3c',width:2},areaStyle:{color:'rgba(231,76,60,.1)'},smooth:true,symbol:'circle',symbolSize:4}]
        });
        return;
    }
    // Bar+Yoy
    let cfg=NTABS.find(t=>t.t===nT);
    if(!cfg)return;
    document.getElementById('nct').textContent=cfg.title;
    document.getElementById('ncu').textContent='单位: '+cfg.u;
    _mc.setOption({
        tooltip:{trigger:'axis'},legend:{data:[cfg.bn,'累计同比'],bottom:0},
        grid:{left:60,right:60,top:15,bottom:40},
        xAxis:{type:'category',data:getLabels(),axisLabel:{rotate:45,fontSize:9,interval:getInt()}},
        yAxis:[{type:'value',name:cfg.u},{type:'value',name:'%'}],
        series:[
            {name:cfg.bn,type:'bar',data:nF.map(d=>NN(d[cfg.bf])),itemStyle:{color:cfg.bc,borderRadius:[4,4,0,0]},barWidth:'45%'},
            {name:'累计同比',type:'line',yAxisIndex:1,data:nF.map(d=>NN(d[cfg.yf])),lineStyle:{color:'#3498db',width:2},symbol:'circle',symbolSize:3}
        ]
    });
}

let _selCities=['北京','上海','深圳','广州'],_cT='new',_cc=null,_bIdx=0,_si=0,_ei=185;

function cData(city,type){
    let o=CITY_DATA.c[city]?.[type];
    if(!o)return{};
    let v=o.v||[], off=o.o||0, map={};
    CITY_DATA.m.forEach((m,i)=>{if(i>=off&&i-off<v.length&&v[i-off]!=null)map[m]=v[i-off];});
    return map;
}

// Build fixed-base index: base period = 100
function buildCityIdx(city,type,bi){
    let mom=cData(city,type), vals=[];
    // First, expand mom% to full length with nulls
    CITY_DATA.m.forEach(m=>{vals.push(mom[m]!=null?mom[m]:null);});
    // Build index: 100 at bi, forward multiply, backward divide
    let idx=Array(vals.length).fill(null);
    if(vals[bi]!=null)idx[bi]=100;
    else{
        // Find nearest valid month to set as 100
        for(let d=1;d<vals.length;d++){
            if(bi-d>=0&&vals[bi-d]!=null){idx[bi-d]=100; break;}
            if(bi+d<vals.length&&vals[bi+d]!=null){idx[bi+d]=100; break;}
        }
    }
    // Forward
    for(let i=0;i<vals.length;i++){
        if(idx[i]===100){
            for(let j=i+1;j<vals.length;j++){
                if(vals[j]!=null&&idx[j-1]!=null)idx[j]=Math.round(idx[j-1]*(1+vals[j]/100)*10)/10;
                else if(idx[j-1]!=null)idx[j]=idx[j-1];
            }
            break;
        }
    }
    // Backward
    for(let i=vals.length-1;i>=0;i--){
        if(idx[i]===100){
            for(let j=i-1;j>=0;j--){
                if(vals[j+1]!=null&&idx[j+1]!=null)idx[j]=Math.round(idx[j+1]/(1+vals[j+1]/100)*10)/10;
                else if(idx[j+1]!=null)idx[j]=idx[j+1];
            }
            break;
        }
    }
    return idx;
}

function getCityLatest(city,type){
    let mom=cData(city,type), last=null;
    for(let i=CITY_DATA.m.length-1;i>=0;i--){
        let v=mom[CITY_DATA.m[i]];
        if(v!=null){last=v;break;}
    }
    return last;
}

// ---- Base Period & Range Selectors ----
function initCitySelectors(){
    let yrs=[],months=CITY_DATA.m;
    months.forEach(m=>{let y=m.substring(0,4);if(!yrs.includes(y))yrs.push(y);});
    let lst=months.length-1;
    ['rbY','rsY','reY'].forEach(id=>{
        let el=document.getElementById(id);
        el.innerHTML=yrs.map(y=>`<option value="${y}">${y}</option>`).join('');
        if(id==='rbY')el.value=months[0].substring(0,4);
        else if(id==='reY')el.value=months[lst].substring(0,4);
        else el.value=months[0].substring(0,4);
    });
    ['rbM','rsM','reM'].forEach(id=>{
        let el=document.getElementById(id);
        el.innerHTML=['01','02','03','04','05','06','07','08','09','10','11','12'].map(m=>`<option value="${m}">${m}</option>`).join('');
        if(id==='rbM'||id==='rsM')el.value=months[0].substring(4,6);
        else el.value=months[lst].substring(4,6);
    });
    // Update base index when base year/month changes
    function updateBaseIdx(){
        let by=document.getElementById('rbY').value,bm=document.getElementById('rbM').value;
        let key=by+bm;
        let idx=months.indexOf(key);
        if(idx>=0)_bIdx=idx;
    }
    ['rbY','rbM'].forEach(id=>{document.getElementById(id).onchange=updateBaseIdx;});
}

function updateRangeIdx(){
    let sy=document.getElementById('rsY').value,sm=document.getElementById('rsM').value;
    let ey=document.getElementById('reY').value,em=document.getElementById('reM').value;
    let sk=sy+sm,ek=ey+em,months=CITY_DATA.m;
    _si=months.indexOf(sk);if(_si<0)_si=0;
    _ei=months.indexOf(ek);if(_ei<0)_ei=months.length-1;
    if(_si>_ei){let t=_si;_si=_ei;_ei=t;}
}

// ---- Chart ----
function renderCityChart(){
    if(_cc){_cc.dispose();_cc=null;}
    _cc=echarts.init(document.getElementById('rc'));
    let t=_cT==='new'?'nm':'sm';
    let colors=['#5470c6','#91cc75','#fac858','#ee6666','#fc8452','#9a60b4','#ea7ccc','#73c0de','#e91e63','#00bcd4'];
    let ms=CITY_DATA.m.slice(_si,_ei+1);
    let series=[]; _selCities.forEach((city,i)=>{
        let idx=buildCityIdx(city,t,_bIdx).slice(_si,_ei+1);
        // Trim leading nulls
        let s=0;while(s<idx.length&&idx[s]==null)s++;
        let e=idx.length-1;while(e>=0&&idx[e]==null)e--;
        if(s>e)return;
        series.push({name:city,type:'line',data:idx.slice(s,e+1).map(v=>v!=null?Math.round(v*10)/10:null),
            smooth:0.4,lineStyle:{width:2},itemStyle:{color:colors[i%colors.length]},symbol:'none',
            markLine:{silent:true,lineStyle:{color:'#666',type:'dashed',width:1},symbol:'none',data:[{yAxis:100,label:{formatter:'基准=100'}}]}});
    });
    if(series.length===0)return;
    let xMs=ms;
    let intv=Math.max(1,Math.floor(xMs.length/18));
    let bm=CITY_DATA.m[_bIdx];
    let title=(_cT==='new'?'新建':'二手')+'住宅定基指数('+bm.replace(/(\d{4})(\d{2})/,'$1.$2')+'=100)';
    document.getElementById('rct').textContent=title;
    _cc.setOption({
        tooltip:{trigger:'axis',backgroundColor:'rgba(20,20,20,.92)',borderColor:'#333',textStyle:{fontSize:12,color:'#eee'},
            formatter:function(ps){let s=ps[0].name.replace(/(\d{4})(\d{2})/,'$1.$2')+'<br/>';ps.forEach(p=>s+=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:4px"></span>${p.seriesName}: <b>${typeof p.value==='number'?p.value.toFixed(1):'--'}</b><br/>`);return s;}},
        legend:{bottom:0,type:'scroll',textStyle:{fontSize:11}},
        grid:{top:20,right:20,bottom:40,left:55},
        xAxis:{type:'category',data:xMs,axisLabel:{fontSize:10,rotate:45,formatter:v=>v.replace(/^(\d{4})(\d{2})/,'$1.$2')},interval:intv},
        yAxis:{type:'value',name:'指数',min:function(v){return Math.floor(Math.min(v.min,95)/5)*5;},axisLabel:{fontSize:11}},
        series
    });
}
